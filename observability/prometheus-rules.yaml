# Prometheus alert rules for self-healing operator
# Install with: kubectl apply -f prometheus-rules.yaml

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: self-healing-operator-alerts
  namespace: self-healing-system
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: self-healing-operator
      interval: 30s
      rules:
        # Pod Issues
        - alert: KubePodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."
        
        - alert: KubePodNotReady
          expr: |
            sum by (namespace, pod) (
              max by(namespace, pod) (
                kube_pod_status_phase{phase=~"Pending|Unknown"}
              ) * on(namespace, pod) group_left(owner_kind) topk by(namespace, pod) (
                1, max by(namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"})
              )
            ) > 0
          for: 15m
          labels:
            severity: warning
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for longer than 15 minutes."
        
        - alert: KubeContainerOOMKilled
          expr: |
            sum_over_time(kube_pod_container_status_terminated_reason{reason="OOMKilled"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "Container in pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was killed due to out of memory."
        
        - alert: KubePodImagePullBackOff
          expr: |
            kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} > 0
          for: 5m
          labels:
            severity: warning
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} cannot pull image"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in ImagePullBackOff state."
        
        # Memory and CPU alerts
        - alert: HighMemoryUsage
          expr: |
            (sum(container_memory_working_set_bytes{pod!=""}) by (namespace, pod) /
            sum(container_spec_memory_limit_bytes{pod!=""}) by (namespace, pod)) > 0.9
          for: 10m
          labels:
            severity: warning
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "High memory usage in pod {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."
        
        - alert: CPUThrottlingHigh
          expr: |
            sum(increase(container_cpu_cfs_throttled_periods_total{pod!=""}[5m])) by (namespace, pod) /
            sum(increase(container_cpu_cfs_periods_total{pod!=""}[5m])) by (namespace, pod) > 0.25
          for: 15m
          labels:
            severity: info
            namespace: "{{ $labels.namespace }}"
            pod: "{{ $labels.pod }}"
          annotations:
            summary: "CPU throttling in pod {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is being throttled {{ $value | humanizePercentage }} of the time."
        
        # Operator health
        - alert: SelfHealingOperatorDown
          expr: |
            up{job="self-healing-operator"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Self-healing operator is down"
            description: "The self-healing operator has been down for more than 5 minutes."
        
        - alert: SelfHealingFixFailureHigh
          expr: |
            rate(self_healing_fixes_failed_total[10m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High remediation failure rate"
            description: "The self-healing operator is experiencing a high failure rate for remediations."
