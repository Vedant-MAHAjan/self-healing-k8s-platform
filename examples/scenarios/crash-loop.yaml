apiVersion: apps/v1
kind: Deployment
metadata:
  name: buggy-app
  namespace: demo
  labels:
    app: buggy-app
    scenario: crash-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buggy-app
  template:
    metadata:
      labels:
        app: buggy-app
        scenario: crash-loop
    spec:
      containers:
      - name: app
        image: busybox:latest
        command: ["sh", "-c"]
        args:
          - |
            echo "Starting application..."
            echo "Simulating crash..."
            exit 1
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
