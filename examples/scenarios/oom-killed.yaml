apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog
  namespace: demo
  labels:
    app: memory-hog
    scenario: oom-killed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog
  template:
    metadata:
      labels:
        app: memory-hog
        scenario: oom-killed
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python", "-u", "-c"]  # -u for unbuffered output
        args:
          - |
            import time
            import sys
            print("Starting memory allocation...", flush=True)
            # Allocate 200MB (exceeds 128Mi limit)
            data = ' ' * 200 * 1024 * 1024
            print(f"Allocated 200MB - app now running", flush=True)
            sys.stdout.flush()
            while True:
                time.sleep(60)
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi  
