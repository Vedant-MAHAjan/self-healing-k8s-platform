{{- if not .Values.ai.existingSecret }}
{{- if or .Values.ai.openai.apiKey .Values.ai.anthropic.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "self-healing-k8s.fullname" . }}-secrets
  namespace: {{ .Values.operator.namespace }}
  labels:
    {{- include "self-healing-k8s.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.ai.openai.apiKey }}
  OPERATOR_OPENAI_API_KEY: {{ .Values.ai.openai.apiKey | quote }}
  {{- end }}
  {{- if .Values.ai.anthropic.apiKey }}
  OPERATOR_ANTHROPIC_API_KEY: {{ .Values.ai.anthropic.apiKey | quote }}
  {{- end }}
  {{- if .Values.argocd.token }}
  OPERATOR_ARGOCD_TOKEN: {{ .Values.argocd.token | quote }}
  {{- end }}
{{- end }}
{{- end }}
