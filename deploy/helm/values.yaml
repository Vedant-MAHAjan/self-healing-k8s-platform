# Default values for self-healing-k8s operator

# Operator image configuration
image:
  repository: self-healing-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Operator configuration
operator:
  # Logging level (DEBUG, INFO, WARNING, ERROR)
  logLevel: INFO
  
  # Dry run mode - only log actions without executing
  dryRun: false
  
  # Namespace where the operator is deployed
  namespace: self-healing-system
  
  # Replica count (should be 1 for leader election to work)
  replicaCount: 1

# Autonomous control plane configuration
controlPlane:
  enabled: true
  policyPath: ""
  stateStorePath: "/tmp/self-healing-control.db"
  schedulerPollInterval: 5
  schedulerWorkerConcurrency: 2

# AI provider configuration
ai:
  # Provider: openai, anthropic, or local
  provider: openai
  
  # OpenAI configuration
  openai:
    apiKey: ""  # Set via --set or use existingSecret
    model: "gpt-4-turbo-preview"
  
  # Anthropic configuration
  anthropic:
    apiKey: ""  # Set via --set or use existingSecret
    model: "claude-3-opus-20240229"
  
  # AI request settings
  timeout: 30
  maxRetries: 3
  
  # Use an existing secret for API keys
  # Secret should contain keys: OPERATOR_OPENAI_API_KEY, OPERATOR_ANTHROPIC_API_KEY
  existingSecret: ""

# Remediation settings
remediation:
  # Automatically apply fixes without manual approval
  autoApprove: false
  
  # Maximum remediation attempts per issue
  maxRetries: 3
  
  # Cooldown period between attempts (seconds)
  cooldown: 300
  
  # Enable/disable specific strategies
  strategies:
    podRestart: true
    scaling: true
    rollback: true

# Prometheus integration
prometheus:
  # Prometheus URL for querying metrics
  url: "http://prometheus-operated:9090"
  
  # Alertmanager URL for receiving alerts
  alertmanagerUrl: "http://alertmanager-operated:9093"
  
  # Enable ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

# ArgoCD integration (optional)
argocd:
  enabled: false
  server: ""
  token: ""

# Resource limits and requests
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  metrics:
    type: ClusterIP
    port: 8000
  alerts:
    type: ClusterIP
    port: 9099

# Metrics configuration
metrics:
  port: 8000
  
# Health check configuration
healthCheck:
  port: 8080

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"

# Additional environment variables
extraEnv: []

# Additional volumes
extraVolumes: []

# Additional volume mounts
extraVolumeMounts: []
