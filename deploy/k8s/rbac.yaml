apiVersion: v1
kind: ServiceAccount
metadata:
  name: self-healing-operator
  namespace: self-healing-system
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: self-healing-operator
  labels:
    app.kubernetes.io/name: self-healing-operator
rules:
  # Pod permissions
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  
  # Deployment permissions
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  
  # Event permissions
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  
  # ConfigMap and Secret permissions (for config)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  
  # Service permissions (for metrics)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  
  # StatefulSet permissions
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  
  # DaemonSet permissions
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
  
  # Node permissions (for node pressure issues)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: self-healing-operator
  labels:
    app.kubernetes.io/name: self-healing-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: self-healing-operator
subjects:
  - kind: ServiceAccount
    name: self-healing-operator
    namespace: self-healing-system
