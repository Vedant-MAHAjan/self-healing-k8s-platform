apiVersion: v1
kind: Service
metadata:
  name: self-healing-operator-metrics
  namespace: self-healing-system
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: operator
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-operator-alerts
  namespace: self-healing-system
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: alerts
spec:
  type: ClusterIP
  ports:
    - name: alerts
      port: 9099
      targetPort: alerts
      protocol: TCP
  selector:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: operator
