apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-operator
  namespace: self-healing-system
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one operator instance should run
  selector:
    matchLabels:
      app.kubernetes.io/name: self-healing-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: self-healing-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: self-healing-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: operator
          image: self-healing-operator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: self-healing-operator-config
          ports:
            - name: metrics
              containerPort: 8000
              protocol: TCP
            - name: healthz
              containerPort: 8080
              protocol: TCP
            - name: alerts
              containerPort: 9099
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
